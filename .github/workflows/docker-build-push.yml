name: Build & Push Docker Images

# 触发条件：GitHub Actions 负责编译；
# 每次 sync:github 把 main 或 dev 分支推过来后自动触发
on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-push:
    name: Build Docker Images (7GB RAM)
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 登录 Docker Hub
      #    需要在 GitHub 仓库 Settings → Secrets → Actions 中配置：
      #      DOCKERHUB_USERNAME = amerluya
      #      DOCKERHUB_TOKEN    = Docker Hub Access Token
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Read build metadata
        id: meta
        run: |
          app_version=$(awk -F'"' '/"version"/ {print $4; exit}' vite-frontend/package.json)
          short_sha="${GITHUB_SHA::7}"
          build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          echo "app_version=$app_version" >> $GITHUB_OUTPUT
          echo "short_sha=$short_sha" >> $GITHUB_OUTPUT
          echo "build_time=$build_time" >> $GITHUB_OUTPUT

      # 3. 根据分支生成不同的镜像 Tags
      - name: Generate tags
        id: tags
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "front_tags=amerluya/flux-panel-yoga-frontend:latest,amerluya/flux-panel-yoga-frontend:${{ steps.meta.outputs.app_version }},amerluya/flux-panel-yoga-frontend:${{ steps.meta.outputs.app_version }}-${{ steps.meta.outputs.short_sha }}" >> $GITHUB_OUTPUT
            echo "back_tags=amerluya/flux-panel-yoga-backend:latest,amerluya/flux-panel-yoga-backend:${{ steps.meta.outputs.app_version }},amerluya/flux-panel-yoga-backend:${{ steps.meta.outputs.app_version }}-${{ steps.meta.outputs.short_sha }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "dev" ]; then
            echo "front_tags=amerluya/flux-panel-yoga-frontend:dev-latest,amerluya/flux-panel-yoga-frontend:dev-${{ steps.meta.outputs.app_version }}-${{ steps.meta.outputs.short_sha }}" >> $GITHUB_OUTPUT
            echo "back_tags=amerluya/flux-panel-yoga-backend:dev-latest,amerluya/flux-panel-yoga-backend:dev-${{ steps.meta.outputs.app_version }}-${{ steps.meta.outputs.short_sha }}" >> $GITHUB_OUTPUT
          fi

      # 4. 启用 BuildKit（内存更高效的 Docker 构建引擎）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. 构建并推送前端镜像
      #    GitHub Actions runner 有 7GB RAM，彻底解决 Server B 内存不足问题
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./vite-frontend
          push: true
          tags: ${{ steps.tags.outputs.front_tags }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.app_version }}
            GIT_SHA=${{ steps.meta.outputs.short_sha }}
            GIT_BRANCH=${{ github.ref_name }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
          # GitHub Actions Cache：package.json 不变则 npm install 层直接复用
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 6. 构建并推送后端镜像
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./springboot-backend
          push: true
          tags: ${{ steps.tags.outputs.back_tags }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.app_version }}
            GIT_SHA=${{ steps.meta.outputs.short_sha }}
            GIT_BRANCH=${{ github.ref_name }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
