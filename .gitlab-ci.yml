# Flux Panel Yoga — CI/CD 配置
#
# 架构: GitLab CI → push to GitHub → GitHub Actions 构建 Docker → Docker Hub → 部署
#
# 版本日志 / Version Log:
# -------------------------------------------------------------
# v1.4.8 [2026-03-08]
#   - deploy:dev 改为按 TRACE_TAG 拉取镜像，解决版本竞态（拉到旧镜像）
#   - 增加 [skip ci] 支持，Claude/Codex 中间 push 不触发远程构建
#   - 删除冗余 sync:github（build:prod 已包含 push）
#   - 删除已不存在的 print_ci_commit_summary.sh 引用
#   - deploy 轮询改为先等 60s 再开始（给 GitHub Actions 启动时间）
# v1.4.3 [2026-03-06]
#   - 收敛版本号显示，统一到 release version + git short SHA
#   - dev / main 镜像标签改为可追溯的版本化 tag，并保留 latest 别名
# =============================================================

variables:
  DEV_TAG: "dev-latest"                      # 兜底部署入口（始终指向最新 dev 构建）
  PROD_TAG: "latest"                         # 生产环境部署入口
  DEPLOY_DIR: "/opt/1panel/apps/local/flux-panel"
  GITHUB_REPO: "https://${GITHUB_TOKEN}@github.com/ksgitgroup/flux-panel-yoga.git"

stages:
  - build
  - deploy

# ── 全局：跳过包含 [skip ci] 的提交 ─────────────────────────
workflow:
  rules:
    - if: $CI_COMMIT_MESSAGE =~ /\[skip ci\]/
      when: never
    - when: always

# ──────────────────────────────────────────────────────────────
# dev 分支：推送到 GitHub 触发 Actions 构建
# ──────────────────────────────────────────────────────────────
build:dev:
  stage: build
  tags:
    - Rn1-Runner-General-01
  variables:
    GIT_DEPTH: "50"
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
  script:
    - |
      APP_VERSION=$(awk -F'"' '/"version"/ {print $4; exit}' vite-frontend/package.json)
      TRACE_TAG="dev-${APP_VERSION}-${CI_COMMIT_SHORT_SHA}"
      echo "🧬 追踪标识: ${TRACE_TAG}"
      echo "🏷️ 部署入口标签: ${DEV_TAG}"
      echo "📝 提交: ${CI_COMMIT_SHORT_SHA} - ${CI_COMMIT_TITLE}"
      echo "🔄 推送 dev 代码到 GitHub 触发 Actions 构建..."
      git config --global user.email "ci@gitlab.kingsungsz.com"
      git config --global user.name "GitLab CI"
      git push "${GITHUB_REPO}" "HEAD:refs/heads/dev" --force
      echo "✅ 已推送，GitHub Actions 将构建 ${DEV_TAG} + ${TRACE_TAG}"

    # ========= 【历史保留】原始 Server B 本地编译脚本 =========
    # 若未来 Server B 升级大内存，可恢复使用本地构建
    # - docker build -t "flux-panel-local/vite-frontend:$DEV_TAG" ./vite-frontend
    # - docker build -t "flux-panel-local/springboot-backend:$DEV_TAG" ./springboot-backend
    # - docker image prune -f
    # ========================================================

# ──────────────────────────────────────────────────────────────
# prod 分支：推送到 GitHub 触发 Actions 构建 + 同步代码
# （合并了原来的 build:prod 和 sync:github，避免重复 push）
# ──────────────────────────────────────────────────────────────
build:prod:
  stage: build
  tags:
    - Rn1-Runner-General-01
  variables:
    GIT_DEPTH: "50"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - |
      APP_VERSION=$(awk -F'"' '/"version"/ {print $4; exit}' vite-frontend/package.json)
      TRACE_TAG="${APP_VERSION}-${CI_COMMIT_SHORT_SHA}"
      echo "🧬 追踪标识: ${TRACE_TAG}"
      echo "🏷️ 部署入口标签: ${PROD_TAG}"
      echo "📝 提交: ${CI_COMMIT_SHORT_SHA} - ${CI_COMMIT_TITLE}"
      echo "🔄 推送 main 代码到 GitHub（触发构建 + 代码同步）..."
      git config --global user.email "ci@gitlab.kingsungsz.com"
      git config --global user.name "GitLab CI"
      git push "${GITHUB_REPO}" "HEAD:refs/heads/main" --force
      echo "✅ 已推送，GitHub Actions 将构建 ${PROD_TAG}、v${APP_VERSION}、${TRACE_TAG}"

# ──────────────────────────────────────────────────────────────
# dev 部署：等待 GitHub Actions 构建完成后拉取精确版本镜像
#
# 改进：先尝试拉取 TRACE_TAG（精确到 commit SHA），
#       确保部署的是本次提交对应的镜像，而非上一次构建的残留。
#       拉取成功后再 tag 为 DEV_TAG 以兼容 docker-compose 配置。
#
# v1.4.9 [2026-03-16]
#   - 增加 Docker Hub 登录，避免匿名拉取 100次/6h 限速
#   - docker pull 失败时显示实际错误，便于诊断
# ──────────────────────────────────────────────────────────────
deploy:dev:
  stage: deploy
  tags:
    - Rn1-Runner-General-01
  needs:
    - build:dev
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
  environment:
    name: development
  script:
    - |
      APP_VERSION=$(awk -F'"' '/"version"/ {print $4; exit}' vite-frontend/package.json)
      TRACE_TAG="dev-${APP_VERSION}-${CI_COMMIT_SHORT_SHA}"
      BACKEND_IMAGE="amerluya/flux-panel-yoga-backend"
      FRONTEND_IMAGE="amerluya/flux-panel-yoga-frontend"

      mkdir -p "$DEPLOY_DIR"
      [ -d "$DEPLOY_DIR/gost.sql" ] && rm -rf "$DEPLOY_DIR/gost.sql" || true
      cp "$CI_PROJECT_DIR/docker-compose-v6.yml" "$DEPLOY_DIR/docker-compose-v6.yml"
      cp "$CI_PROJECT_DIR/gost.sql" "$DEPLOY_DIR/gost.sql"
      cp "$CI_PROJECT_DIR/scripts/remote_deploy.sh" "$DEPLOY_DIR/remote_deploy.sh"
      chmod +x "$DEPLOY_DIR/remote_deploy.sh"

      # ── Docker Hub 登录（避免匿名拉取 100次/6h 限速） ──
      if [ -n "${DOCKERHUB_USERNAME:-}" ] && [ -n "${DOCKERHUB_TOKEN:-}" ]; then
        echo "🔐 登录 Docker Hub..."
        if echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin 2>&1; then
          echo "✅ Docker Hub 登录成功"
        else
          echo "⚠️ Docker Hub 登录失败（token 可能过期），将以匿名方式拉取"
        fi
      else
        echo "⚠️ 未配置 DOCKERHUB_USERNAME / DOCKERHUB_TOKEN，使用匿名拉取（限速 100次/6h）"
      fi

      echo "⏳ 等待 GitHub Actions 构建镜像..."
      echo "   后端: ${BACKEND_IMAGE}:${TRACE_TAG}"
      echo "   前端: ${FRONTEND_IMAGE}:${TRACE_TAG}"

      echo "⏳ 预等待 60s（GitHub Actions 冷启动）..."
      sleep 60

      PULLED=0
      LAST_PULL_ERR=""
      for i in $(seq 1 24); do
        if PULL_OUTPUT=$(docker pull "${BACKEND_IMAGE}:${TRACE_TAG}" 2>&1); then
          echo "✅ 后端镜像 ${TRACE_TAG} 拉取成功！"
          docker pull "${FRONTEND_IMAGE}:${TRACE_TAG}" 2>&1 || true
          PULLED=1
          break
        fi
        LAST_PULL_ERR="$PULL_OUTPUT"
        if [ $i -eq 1 ] || [ $((i % 5)) -eq 0 ]; then
          echo "⚠️ docker pull 失败 (第 ${i} 次):"
          echo "$PULL_OUTPUT" | tail -3
          echo "---"
        fi
        echo "⏳ 等待编译中... ($i/24, 每次等 20s)"
        sleep 20
      done

      if [ "$PULLED" -eq 0 ]; then
        echo "⚠️ TRACE_TAG ${TRACE_TAG} 拉取超时，最后一次错误:"
        echo "$LAST_PULL_ERR" | tail -5
        echo "---"
        echo "⚠️ 回退到 ${DEV_TAG}..."
        if FALLBACK_OUTPUT=$(docker pull "${BACKEND_IMAGE}:${DEV_TAG}" 2>&1); then
          echo "✅ 回退拉取 ${DEV_TAG} 成功（注意：可能不是本次提交的版本）"
        else
          echo "❌ 镜像拉取失败！"
          echo "$FALLBACK_OUTPUT" | tail -5
          echo "🔍 诊断信息:"
          echo "   Docker version: $(docker --version 2>&1)"
          echo "   登录状态: $(cat ~/.docker/config.json 2>/dev/null | grep -o '"auths":{[^}]*}' || echo '未登录')"
          exit 1
        fi
      fi

      bash "$DEPLOY_DIR/remote_deploy.sh" "amerluya" "${DEV_TAG}" "$DEPLOY_DIR"

# ──────────────────────────────────────────────────────────────
# prod 部署：Runner 在服务器 C，手动确认后部署
# ──────────────────────────────────────────────────────────────
deploy:prod:
  stage: deploy
  tags:
    - Rn2-US-Runner-Gereral
  needs:
    - build:prod
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  environment:
    name: production
  script:
    - |
      APP_VERSION=$(awk -F'"' '/"version"/ {print $4; exit}' vite-frontend/package.json)
      TRACE_TAG="${APP_VERSION}-${CI_COMMIT_SHORT_SHA}"
      BACKEND_IMAGE="amerluya/flux-panel-yoga-backend"
      DEPLOY_DIR="/opt/1panel/apps/local/flux-panel"

      mkdir -p "$DEPLOY_DIR"
      [ -d "$DEPLOY_DIR/gost.sql" ] && rm -rf "$DEPLOY_DIR/gost.sql" || true
      cp "$CI_PROJECT_DIR/docker-compose-v6.yml" "$DEPLOY_DIR/docker-compose-v6.yml"
      cp "$CI_PROJECT_DIR/gost.sql" "$DEPLOY_DIR/gost.sql"
      cp "$CI_PROJECT_DIR/scripts/remote_deploy.sh" "$DEPLOY_DIR/remote_deploy.sh"
      chmod +x "$DEPLOY_DIR/remote_deploy.sh"

      # ── Docker Hub 登录 ──
      if [ -n "${DOCKERHUB_USERNAME:-}" ] && [ -n "${DOCKERHUB_TOKEN:-}" ]; then
        echo "🔐 登录 Docker Hub..."
        if echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin 2>&1; then
          echo "✅ Docker Hub 登录成功"
        else
          echo "⚠️ Docker Hub 登录失败（token 可能过期），将以匿名方式拉取"
        fi
      else
        echo "⚠️ 未配置 DOCKERHUB_USERNAME / DOCKERHUB_TOKEN，使用匿名拉取（限速 100次/6h）"
      fi

      echo "⏳ 等待 GitHub Actions 构建 ${TRACE_TAG} ..."
      sleep 60

      PULLED=0
      LAST_PULL_ERR=""
      for i in $(seq 1 24); do
        if PULL_OUTPUT=$(docker pull "${BACKEND_IMAGE}:${TRACE_TAG}" 2>&1); then
          echo "✅ 镜像 ${TRACE_TAG} 拉取成功！"
          PULLED=1
          break
        fi
        LAST_PULL_ERR="$PULL_OUTPUT"
        if [ $i -eq 1 ] || [ $((i % 5)) -eq 0 ]; then
          echo "⚠️ docker pull 失败 (第 ${i} 次):"
          echo "$PULL_OUTPUT" | tail -3
          echo "---"
        fi
        echo "⏳ 等待编译中... ($i/24)"
        sleep 20
      done

      if [ "$PULLED" -eq 0 ]; then
        echo "⚠️ TRACE_TAG ${TRACE_TAG} 拉取超时，最后一次错误:"
        echo "$LAST_PULL_ERR" | tail -5
        echo "---"
        echo "⚠️ 回退到 ${PROD_TAG}..."
        if FALLBACK_OUTPUT=$(docker pull "${BACKEND_IMAGE}:${PROD_TAG}" 2>&1); then
          echo "✅ 回退拉取 ${PROD_TAG} 成功"
        else
          echo "❌ 拉取失败！"
          echo "$FALLBACK_OUTPUT" | tail -5
          exit 1
        fi
      fi

      bash "$DEPLOY_DIR/remote_deploy.sh" "amerluya" "${PROD_TAG}" "$DEPLOY_DIR"
