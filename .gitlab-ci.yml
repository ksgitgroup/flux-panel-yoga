# =============================================================
# flux-panel GitLab CI/CD 流水线
#
# 架构：GitLab Runner 安装在部署目标服务器上（shell executor）
#   → CI 直接在服务器本地执行命令，无需 SSH，无需传递 SSH 密钥
#
# 流程：
#   推送 dev  → build:dev  → deploy:dev（自动）
#   推送 main → build:prod → deploy:prod（手动触发）
#
# 必须在 GitLab → Settings → CI/CD → Variables 中配置：
#   无！服务器 B 上的 Runner 直接在本机执行 docker compose，
#   不需要 SSH 密钥，不需要 DB 密码（那些在服务器本地 .env 里）。
#
#   如果将来需要跨服务器 SSH 部署才需添加：
#     DEPLOY_PROD_HOST / DEPLOY_PROD_USER / DEPLOY_PROD_KEY
#
# 服务器上首次手动配置（只做一次）：
#   mkdir -p /opt/flux-panel
#   cp /path/to/.env.example /opt/flux-panel/.env
#   vi /opt/flux-panel/.env     # 填入密码、端口等真实值
# =============================================================

variables:
  IMAGE_BASE: $CI_REGISTRY_IMAGE
  DEV_TAG: "dev-$CI_COMMIT_SHORT_SHA"
  PROD_TAG: "latest"
  DEPLOY_DIR: "/opt/flux-panel"

stages:
  - build
  - deploy

# ──────────────────────────────────────────────────────────────
# 构建：dev 分支 → 打 dev-<sha> 标签
# ──────────────────────────────────────────────────────────────
build:dev:
  stage: build
  tags:
    - flux-panel-runner       # Runner 注册时需指定此 tag
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - echo "🔨 构建前端镜像 tag=$DEV_TAG ..."
    - docker build -t "$IMAGE_BASE/vite-frontend:$DEV_TAG" ./vite-frontend
    - docker push "$IMAGE_BASE/vite-frontend:$DEV_TAG"
    - echo "🔨 构建后端镜像 tag=$DEV_TAG ..."
    - docker build -t "$IMAGE_BASE/springboot-backend:$DEV_TAG" ./springboot-backend
    - docker push "$IMAGE_BASE/springboot-backend:$DEV_TAG"
    - echo "✅ 镜像推送完成 → $DEV_TAG"

# ──────────────────────────────────────────────────────────────
# 构建：main 分支 → 打 latest 标签
# ──────────────────────────────────────────────────────────────
build:prod:
  stage: build
  tags:
    - flux-panel-runner
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - echo "🔨 构建前端镜像 tag=$PROD_TAG ..."
    - docker build -t "$IMAGE_BASE/vite-frontend:$PROD_TAG" ./vite-frontend
    - docker push "$IMAGE_BASE/vite-frontend:$PROD_TAG"
    - echo "🔨 构建后端镜像 tag=$PROD_TAG ..."
    - docker build -t "$IMAGE_BASE/springboot-backend:$PROD_TAG" ./springboot-backend
    - docker push "$IMAGE_BASE/springboot-backend:$PROD_TAG"
    - echo "✅ 镜像推送完成 → $PROD_TAG"

# ──────────────────────────────────────────────────────────────
# 部署：Runner 就在服务器 B 上 → 直接本机执行，无需 SSH
# CI 只更新 IMAGE_REGISTRY / IMAGE_TAG 两行，
# DB 密码 / JWT / 端口等变量保留在服务器本地 .env，CI 不接触
# ──────────────────────────────────────────────────────────────
deploy:dev:
  stage: deploy
  tags:
    - flux-panel-runner
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
  environment:
    name: development
  script:
    - echo "🚀 部署到本机开发环境（Runner 即目标服务器）..."
    - cd $DEPLOY_DIR

    # 同步最新 compose 文件和 sql
    - cp $CI_PROJECT_DIR/docker-compose-v6.yml docker-compose.yml
    - cp $CI_PROJECT_DIR/gost.sql gost.sql

    # 用 GitLab 内置凭据登录 Registry（无需人工配置）
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"

    # 只更新镜像地址和 Tag，其余 .env 变量（密码/端口）完全不变
    - sed -i "s|^IMAGE_REGISTRY=.*|IMAGE_REGISTRY=$IMAGE_BASE|" .env
    - sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=$DEV_TAG|" .env

    # 拉取新镜像并重启
    - docker compose pull
    - docker compose up -d --remove-orphans
    - echo "✅ 开发环境部署完成 → $DEV_TAG"

# ──────────────────────────────────────────────────────────────
# 部署：生产服务器（不同机器，需要 SSH）→ 手动触发
# 需要在 GitLab CI 变量中配置：
#   DEPLOY_PROD_HOST / DEPLOY_PROD_USER / DEPLOY_PROD_KEY（File类型）
# ──────────────────────────────────────────────────────────────
deploy:prod:
  stage: deploy
  tags:
    - flux-panel-runner
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual    # 合并 main 后在 GitLab UI 手动点击才执行
  environment:
    name: production
    url: http://$DEPLOY_PROD_HOST
  script:
    - echo "🚀 SSH 部署到生产服务器 $DEPLOY_PROD_HOST ..."
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - cp "$DEPLOY_PROD_KEY" ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -p 22 "$DEPLOY_PROD_HOST" >> ~/.ssh/known_hosts 2>/dev/null
    - |
      scp -i ~/.ssh/id_rsa \
        docker-compose-v6.yml \
        gost.sql \
        "$DEPLOY_PROD_USER@$DEPLOY_PROD_HOST:$DEPLOY_DIR/"
    - |
      ssh -i ~/.ssh/id_rsa "$DEPLOY_PROD_USER@$DEPLOY_PROD_HOST" bash << 'SSHEOF'
        set -e
        cd /opt/flux-panel
        docker login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
        sed -i "s|^IMAGE_REGISTRY=.*|IMAGE_REGISTRY=${IMAGE_BASE}|" .env
        sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${PROD_TAG}|" .env
        cp docker-compose-v6.yml docker-compose.yml
        docker compose pull
        docker compose up -d --remove-orphans
        echo "✅ 生产环境部署完成 → ${PROD_TAG}"
SSHEOF
