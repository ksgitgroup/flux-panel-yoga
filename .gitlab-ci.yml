# =============================================================
# flux-panel GitLab CI/CD 流水线
#
# 架构：GitLab Runner 安装在服务器 B 上（shell executor）
#   → deploy:dev 直接本机执行（无 SSH）
#   → deploy:prod SSH 到生产服务器
#
# 流程：
#   推送 dev  → build:dev  → deploy:dev（自动）
#   推送 main → build:prod → deploy:prod（手动触发）
#
# GitLab CI/CD Variables 配置（Settings → CI/CD → Variables）：
#   开发环境：无需配置任何变量！
#   生产环境（将来用）：
#     DEPLOY_PROD_HOST  生产服务器 IP
#     DEPLOY_PROD_USER  SSH 用户
#     DEPLOY_PROD_KEY   SSH 私钥（类型 File）
# =============================================================

variables:
  IMAGE_BASE: $CI_REGISTRY_IMAGE
  DEV_TAG: "dev-$CI_COMMIT_SHORT_SHA"
  PROD_TAG: "latest"
  DEPLOY_DIR: "/opt/1panel/apps/local/flux-panel"

stages:
  - build
  - deploy

# ──────────────────────────────────────────────────────────────
# dev 分支：构建并推送镜像（打 dev-<sha> 标签）
# ──────────────────────────────────────────────────────────────
build:dev:
  stage: build
  tags:
    - Rn1-Runner-General-01
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - echo "🔨 构建前端 $DEV_TAG"
    - docker build -t "$IMAGE_BASE/vite-frontend:$DEV_TAG" ./vite-frontend
    - docker push "$IMAGE_BASE/vite-frontend:$DEV_TAG"
    - echo "🔨 构建后端 $DEV_TAG"
    - docker build -t "$IMAGE_BASE/springboot-backend:$DEV_TAG" ./springboot-backend
    - docker push "$IMAGE_BASE/springboot-backend:$DEV_TAG"
    - echo "✅ 构建推送完成 $DEV_TAG"

# ──────────────────────────────────────────────────────────────
# main 分支：构建并推送镜像（打 latest 标签）
# ──────────────────────────────────────────────────────────────
build:prod:
  stage: build
  tags:
    - Rn1-Runner-General-01
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - echo "🔨 构建前端 $PROD_TAG"
    - docker build -t "$IMAGE_BASE/vite-frontend:$PROD_TAG" ./vite-frontend
    - docker push "$IMAGE_BASE/vite-frontend:$PROD_TAG"
    - echo "🔨 构建后端 $PROD_TAG"
    - docker build -t "$IMAGE_BASE/springboot-backend:$PROD_TAG" ./springboot-backend
    - docker push "$IMAGE_BASE/springboot-backend:$PROD_TAG"
    - echo "✅ 构建推送完成 $PROD_TAG"

# ──────────────────────────────────────────────────────────────
# dev 部署：Runner 在服务器 B → 直接本机执行 deploy 脚本
# ──────────────────────────────────────────────────────────────
deploy:dev:
  stage: deploy
  tags:
    - Rn1-Runner-General-01
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
  environment:
    name: development
  script:
    - mkdir -p $DEPLOY_DIR
    - cp $CI_PROJECT_DIR/docker-compose-v6.yml $DEPLOY_DIR/docker-compose-v6.yml
    - cp $CI_PROJECT_DIR/gost.sql $DEPLOY_DIR/gost.sql
    - cp $CI_PROJECT_DIR/scripts/remote_deploy.sh $DEPLOY_DIR/remote_deploy.sh
    - chmod +x $DEPLOY_DIR/remote_deploy.sh
    - bash $DEPLOY_DIR/remote_deploy.sh "$IMAGE_BASE" "$DEV_TAG" "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY" "$DEPLOY_DIR"

# ──────────────────────────────────────────────────────────────
# prod 部署：SSH 到生产服务器 → 手动触发
# ──────────────────────────────────────────────────────────────
deploy:prod:
  stage: deploy
  tags:
    - Rn1-Runner-General-01
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  environment:
    name: production
    url: http://$DEPLOY_PROD_HOST
  script:
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - cp "$DEPLOY_PROD_KEY" ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -p 22 "$DEPLOY_PROD_HOST" >> ~/.ssh/known_hosts 2>/dev/null
    - scp -i ~/.ssh/id_rsa docker-compose-v6.yml gost.sql scripts/remote_deploy.sh "$DEPLOY_PROD_USER@$DEPLOY_PROD_HOST:$DEPLOY_DIR/"
    - ssh -i ~/.ssh/id_rsa "$DEPLOY_PROD_USER@$DEPLOY_PROD_HOST" "chmod +x $DEPLOY_DIR/remote_deploy.sh && bash $DEPLOY_DIR/remote_deploy.sh '$IMAGE_BASE' '$PROD_TAG' '$CI_REGISTRY_USER' '$CI_REGISTRY_PASSWORD' '$CI_REGISTRY' '$DEPLOY_DIR'"
